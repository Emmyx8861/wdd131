<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <div class="form-group">
                <label for="productName">Product Name</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Choose a Product ...</option>
                    </select>
            </div>

            <fieldset class="form-group rating-group">
                <legend>Overall Rating</legend>
                <div class="stars">
                    <label>
                        <span>☆</span>
                        <input type="radio" id="rating1" name="rating" value="1" required>
                    </label>
                    <label>
                        <span>☆☆</span>
                        <input type="radio" id="rating2" name="rating" value="2" required>
                    </label>
                    <label>
                        <span>☆☆☆</span>
                        <input type="radio" id="rating3" name="rating" value="3" required>
                    </label>
                    <label>
                        <span>☆☆☆☆</span>
                        <input type="radio" id="rating4" name="rating" value="4" required>
                    </label>
                    <label>
                        <span>☆☆☆☆☆</span>
                        <input type="radio" id="rating5" name="rating" value="5" required>
                    </label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="installDate">Date of Installation</label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <fieldset class="form-group features-group">
                <legend>Which features did you find useful in the product?<br><em>(Check all that apply)</em></legend>
                <label><input type="checkbox" id="feature1" name="features" value="Durability"> Durability</label>
                <label><input type="checkbox" id="feature2" name="features" value="Ease of Use"> Ease of Use</label>
                <label><input type="checkbox" id="feature3" name="features" value="Performance"> Performance</label>
                <label><input type="checkbox" id="feature4" name="features" value="Design"> Design</label>
            </fieldset>

            <div class="form-group">
                <label for="reviewText">Written Review <span class="optional">(Optional)</span></label>
                <textarea id="reviewText" name="reviewText" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="userName">Your Name <span class="optional">(Optional)</span></label>
                <input type="text" id="userName" name="userName">
            </div>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> 🌸 Emmanuel Adewemimo 🌸 Madagascar</p>
        <p>Last Modification: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
